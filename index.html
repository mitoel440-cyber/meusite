<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>XT FF PRO</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    padding: 20px;
}
textarea {
    width: 100%;
    height: 120px;
    margin: 10px 0;
    padding: 10px;
}
button {
    padding: 10px;
    margin: 5px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}
canvas {
    width: 100%;
    margin-top: 20px;
}
</style>
</head>
<body>

<h1>🏆 XT FF PRO</h1>

<h3>📌 Cadastro de Times (LINE = Jogador representante)</h3>
<textarea id="teams" placeholder="Ex:
França=SCREW
Brasil=XPTO"></textarea>

<h3>📊 Resultado da queda</h3>
<textarea id="result" placeholder="Ex:
1 lugar
SCREW - 5
AAA - 2
BBB - 1
CCC - 3"></textarea>

<button onclick="adicionar()">➕ Adicionar queda</button>
<button onclick="resetar()">🔄 Resetar</button>

<h2>🏆 Ranking</h2>
<pre id="output"></pre>

<hr>

<h2>🖼️ Banner</h2>
<input type="file" id="upload">

<button onclick="gerarBanner()">🎯 Gerar Banner</button>
<button onclick="baixar()">⬇️ Baixar Imagem</button>

<canvas id="canvas"></canvas>

<script>

const tabela = {1:12,2:9,3:8,4:7,5:6,6:5,7:4,8:3,9:2,10:1,11:0,12:0};

let total = {};
let killsTotal = {};

function adicionar(){

    let teamsText = document.getElementById("teams").value.split("\n");
    let resultText = document.getElementById("result").value.split("\n");

    let teams = {};

    teamsText.forEach(linha=>{
        let [time,nick]=linha.split("=");
        if(time && nick){
            teams[nick.trim().toLowerCase()] = time.trim();
        }
    });

    let squad = [];
    let posicao = 0;

    resultText.forEach(linha=>{

        if(linha.includes("lugar")){
            posicao = parseInt(linha);
            squad = [];
        }

        else if(linha.includes("-")){
            let [nick,k] = linha.split("-");
            squad.push({
                nick: nick.trim().toLowerCase(),
                kills: parseInt(k)
            });
        }

        if(squad.length === 4){

            let totalKills = squad.reduce((a,b)=>a+b.kills,0);

            let timeEncontrado = null;

            squad.forEach(p=>{
                if(teams[p.nick]){
                    timeEncontrado = teams[p.nick];
                }
            });

            if(timeEncontrado){

                let pontos = totalKills + (tabela[posicao] || 0);

                total[timeEncontrado] = (total[timeEncontrado]||0)+pontos;
                killsTotal[timeEncontrado] = (killsTotal[timeEncontrado]||0)+totalKills;

            }

            squad = [];
        }

    });

    atualizar();
}

function atualizar(){
    let ranking = Object.entries(total)
    .sort((a,b)=>b[1]-a[1]);

    let txt = ranking.map(([t,p])=>`${t}: ${p} pts`).join("\n");
    document.getElementById("output").innerText = txt;
}

function resetar(){
    total = {};
    killsTotal = {};
    atualizar();
}

function gerarBanner(){

    const file = document.getElementById("upload").files[0];
    if(!file) return alert("Escolhe o banner!");

    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = function(){

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img,0,0);

        let ranking = Object.entries(total)
        .sort((a,b)=>b[1]-a[1]);

        let fontSize = img.width * 0.025;
        ctx.font = fontSize + "px Arial";

        ctx.fillStyle = "white";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;

        let yStart = img.height * 0.35;
        let space = img.height * 0.055;

        let xEquipe = img.width * 0.28;
        let xKills = img.width * 0.68;
        let xPontos = img.width * 0.82;

        ranking.forEach(([time,pontos],i)=>{

            let y = yStart + (i * space);
            let kills = killsTotal[time] || 0;

            ctx.strokeText(time, xEquipe, y);
            ctx.fillText(time, xEquipe, y);

            ctx.strokeText(kills, xKills, y);
            ctx.fillText(kills, xKills, y);

            ctx.strokeText(pontos, xPontos, y);
            ctx.fillText(pontos, xPontos, y);
        });

    }
}

function baixar(){
    let link = document.createElement("a");
    link.download = "resultado.png";
    link.href = document.getElementById("canvas").toDataURL();
    link.click();
}

</script>

</body>
</html>
