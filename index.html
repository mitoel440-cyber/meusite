<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>XT FF PRO</title>

<style>

body{
  margin:0;
  font-family:Arial;
  color:white;
  background:#000;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#ff2a2a;
}

textarea{
  width:100%;
  height:150px;
  margin-top:10px;
  padding:10px;
  background:#000;
  color:white;
  border:1px solid red;
}

button{
  margin-top:10px;
  padding:10px;
  background:red;
  border:none;
  cursor:pointer;
  color:white;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid #333;
  text-align:center;
}

canvas{
  width:100%;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🏆 XT FF PRO</h1>

<h3>📋 Times (LINE e representante)</h3>
<textarea id="times"></textarea>

<h3>📊 Resultado da queda</h3>
<textarea id="input"></textarea>

<br>
<button onclick="processar()">Adicionar queda</button>
<button onclick="resetar()">Resetar</button>

<h2>🏆 Ranking</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Time</th>
<th>Kills</th>
<th>Pontos</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>

<hr>

<h2>🖼️ Banner</h2>

<input type="file" id="img">
<button onclick="gerar()">Gerar Banner</button>
<button onclick="baixar()">Baixar</button>

<canvas id="cv"></canvas>

</div>

<script>

const tabela = {1:12,2:9,3:8,4:7,5:6,6:5,7:4,8:3,9:2,10:1,11:0,12:0};

let total = {};
let killsTotal = {};
let mapaTimes = {};

function carregarTimes(){
  let linhas = document.getElementById("times").value.split("\n");
  let atual = "";

  linhas.forEach(l=>{
    if(l.startsWith("LINE:")){
      atual = l.replace("LINE:","").trim();
    }
    if(l.startsWith("JOGADOR:")){
      let nick = l.replace("JOGADOR:","").trim();
      mapaTimes[nick] = atual;
    }
  });
}

function processar(){

carregarTimes();

let texto = document.getElementById("input").value.split("\n");

let time = "";
let pos = 0;
let kills = [];

texto.forEach(l => {

l = l.trim();
if(l=="") return;

if(!l.includes(":")){
let p = l.split(" ");
time = p[0];
pos = parseInt(p[1]);
kills = [];
}else{
let nick = l.split(":")[0].trim();
let k = parseInt(l.split(":")[1]);

if(!time && mapaTimes[nick]){
  time = mapaTimes[nick];
}

if(!isNaN(k)) kills.push(k);
}

if(kills.length==4){
let soma = kills.reduce((a,b)=>a+b,0);
let pts = soma + (tabela[pos]||0);

total[time] = (total[time]||0)+pts;
killsTotal[time] = (killsTotal[time]||0)+soma;

kills=[];
time="";
}

});

atualizar();
}

function atualizar(){

let rank = Object.entries(total).sort((a,b)=>b[1]-a[1]);

let html="";

rank.forEach(([t,p],i)=>{
html+=`
<tr>
<td>${i+1}°</td>
<td>${t}</td>
<td>${killsTotal[t]||0}</td>
<td>${p}</td>
</tr>
`;
});

document.getElementById("ranking").innerHTML=html;
}

function resetar(){
total={};
killsTotal={};
document.getElementById("ranking").innerHTML="";
}

function gerar(){

let file=document.getElementById("img").files[0];
if(!file) return alert("Escolhe o banner");

let img=new Image();
img.src=URL.createObjectURL(file);

img.onload=function(){

let c=document.getElementById("cv");
let ctx=c.getContext("2d");

c.width=img.width;
c.height=img.height;

ctx.drawImage(img,0,0);

let rank=Object.entries(total).sort((a,b)=>b[1]-a[1]);

ctx.font = "38px Arial";
ctx.fillStyle = "white";
ctx.strokeStyle = "black";
ctx.lineWidth = 4;

// 🔥 POSIÇÕES AJUSTADAS PRO SEU BANNER
let xEquipe = 420;
let xKills = 900;
let xPontos = 1080;

let yStart = 430;
let espaco = 65;

rank.forEach(([t,p],i)=>{

let y = yStart + (i * espaco);
let kills = killsTotal[t] || 0;

ctx.strokeText(t, xEquipe, y);
ctx.fillText(t, xEquipe, y);

ctx.strokeText(kills, xKills, y);
ctx.fillText(kills, xKills, y);

ctx.strokeText(p, xPontos, y);
ctx.fillText(p, xPontos, y);

});

}
}

function baixar(){
let link=document.createElement("a");
link.download="resultado.png";
link.href=document.getElementById("cv").toDataURL();
link.click();
}

</script>

</body>
</html>
