<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tabela Belladonna</title>

<style>

body{
  margin:0;
  font-family:Arial;
  color:white;
  background: url("fundo.jpg") no-repeat center center fixed;
  background-size: cover;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
  top:0;
  left:0;
  z-index:-1;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.titulo{
  text-align:center;
  font-size:34px;
  color:#ff2a2a;
  text-shadow:0 0 10px red,0 0 25px red;
}

textarea{
  width:100%;
  height:140px;
  margin-top:10px;
  padding:10px;
  background:#000;
  color:white;
  border:1px solid red;
  border-radius:8px;
}

button{
  margin-top:10px;
  padding:10px;
  background:linear-gradient(45deg,#ff0000,#ff4d4d);
  border:none;
  cursor:pointer;
  color:white;
  border-radius:6px;
  box-shadow:0 0 10px red;
}

button:hover{
  transform:scale(1.05);
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:rgba(0,0,0,0.6);
  border-radius:10px;
}

td,th{
  padding:10px;
  border-bottom:1px solid #333;
  text-align:center;
}

.top1{color:gold;}
.top2{color:silver;}
.top3{color:#cd7f32;}

canvas{
  width:100%;
  margin-top:20px;
}

/* LOGIN PRO */

#loginTela{
  position:fixed;
  width:100%;
  height:100%;
  background: linear-gradient(45deg, black, #1a0000);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.loginTitulo{
  font-size:30px;
  color:red;
  text-shadow:0 0 10px red,0 0 30px red;
  margin-bottom:20px;
}

#loginTela input{
  padding:12px;
  margin:5px;
  width:200px;
  border:none;
  border-radius:5px;
  background:#111;
  color:white;
  text-align:center;
}

#loginTela button{
  width:200px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela">
<h2 class="loginTitulo">🔐 BELLADONNA ACCESS</h2>
<input id="user" placeholder="Login">
<input id="pass" type="password" placeholder="Senha">
<button onclick="entrar()">ENTRAR</button>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<div class="container">

<h1 class="titulo">🏆 TABELA BELLADONNA</h1>

<h3>📋 Times (LINE e representante)</h3>
<textarea id="times"></textarea>

<h3>📊 Resultado da queda</h3>
<textarea id="input"></textarea>

<button onclick="processar()">Adicionar queda</button>
<button onclick="resetar()">Resetar</button>

<h2>🏆 Ranking</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Time</th>
<th>Kills</th>
<th>Pontos</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>

<hr>

<h2>🖼️ Banner</h2>

<input type="file" id="img">
<button onclick="gerar()">Gerar Banner</button>
<button onclick="baixar()">Baixar</button>

<canvas id="cv"></canvas>

</div>
</div>

<script>

// LOGIN

function entrar(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u==="kauaz1nx" && p==="vanuza35"){

localStorage.setItem("logado","sim");

document.getElementById("loginTela").style.display="none";
document.getElementById("site").style.display="block";

}else{
alert("Acesso negado!");
}

}

// AUTO LOGIN
window.onload = function(){
if(localStorage.getItem("logado")==="sim"){
document.getElementById("loginTela").style.display="none";
document.getElementById("site").style.display="block";
}
}

// SISTEMA

const tabela = {1:12,2:9,3:8,4:7,5:6,6:5,7:4,8:3,9:2,10:1,11:0,12:0};

let total={}, killsTotal={}, mapaTimes={};

function carregarTimes(){
let linhas=document.getElementById("times").value.split("\n");
let atual="";
linhas.forEach(l=>{
if(l.startsWith("LINE:")) atual=l.replace("LINE:","").trim();
if(l.startsWith("JOGADOR:")){
let nick=l.replace("JOGADOR:","").trim();
mapaTimes[nick]=atual;
}
});
}

function processar(){

carregarTimes();

let texto=document.getElementById("input").value.split("\n");

let time="",pos=0,kills=[];

texto.forEach(l=>{

l=l.trim();
if(!l) return;

if(!l.includes(":")){
let p=l.split(" ");
time=p[0];
pos=parseInt(p[1]);
kills=[];
}else{

let nick=l.split(":")[0].trim();
let k=parseInt(l.split(":")[1]);

if(!time && mapaTimes[nick]) time=mapaTimes[nick];

if(!isNaN(k)) kills.push(k);
}

if(kills.length==4){
let soma=kills.reduce((a,b)=>a+b,0);
let pts=soma+(tabela[pos]||0);

total[time]=(total[time]||0)+pts;
killsTotal[time]=(killsTotal[time]||0)+soma;

kills=[];
time="";
}

});

atualizar();
}

function atualizar(){

let rank=Object.entries(total).sort((a,b)=>b[1]-a[1]);

let html="";

rank.forEach(([t,p],i)=>{

let classe="";
if(i==0) classe="top1";
if(i==1) classe="top2";
if(i==2) classe="top3";

html+=`
<tr class="${classe}">
<td>${i+1}°</td>
<td>${t}</td>
<td>${killsTotal[t]||0}</td>
<td>${p}</td>
</tr>`;
});

document.getElementById("ranking").innerHTML=html;
}

function resetar(){
total={};killsTotal={};
document.getElementById("ranking").innerHTML="";
}

function gerar(){

let file=document.getElementById("img").files[0];
if(!file) return alert("Escolhe o banner");

let img=new Image();
img.src=URL.createObjectURL(file);

img.onload=function(){

let c=document.getElementById("cv");
let ctx=c.getContext("2d");

c.width=img.width;
c.height=img.height;

ctx.drawImage(img,0,0);

let rank=Object.entries(total).sort((a,b)=>b[1]-a[1]);

ctx.font="34px Arial";
ctx.fillStyle="white";
ctx.strokeStyle="black";
ctx.lineWidth=4;

let xEquipe=480;
let xKills=920;
let xPontos=1100;

let yStart=470;
let espaco=65;

rank.forEach(([t,p],i)=>{

let y=yStart+(i*espaco);
let kills=killsTotal[t]||0;

ctx.strokeText(t,xEquipe,y);
ctx.fillText(t,xEquipe,y);

ctx.strokeText(kills,xKills,y);
ctx.fillText(kills,xKills,y);

ctx.strokeText(p,xPontos,y);
ctx.fillText(p,xPontos,y);

});

}
}

function baixar(){
let link=document.createElement("a");
link.download="resultado.png";
link.href=document.getElementById("cv").toDataURL();
link.click();
}

</script>

</body>
</html>
