<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>XT FF PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:#000;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#00f0ff;
}

textarea{
  width:100%;
  height:150px;
  margin-top:10px;
  padding:10px;
  background:#000;
  color:white;
  border:1px solid #00f0ff;
}

button{
  margin-top:10px;
  padding:10px;
  background:#00f0ff;
  border:none;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
}

td,th{
  padding:10px;
  text-align:center;
}

canvas{
  width:100%;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 XT FF PRO</h1>

<h3>📌 Cadastro de Times</h3>
<textarea id="teams" placeholder="LINE: França
JOGADOR: Screw"></textarea>

<h3>📊 Resultado da queda</h3>
<textarea id="input"></textarea>

<button onclick="processar()">Adicionar queda</button>
<button onclick="resetar()">Resetar</button>

<table border="1">
<tr>
<th>#</th>
<th>Time</th>
<th>Kills</th>
<th>Pontos</th>
</tr>
<tbody id="ranking"></tbody>
</table>

<hr>

<input type="file" id="img">
<button onclick="gerar()">Gerar Banner</button>
<canvas id="cv"></canvas>

</div>

<script>

const tabela = {1:12,2:9,3:8,4:7,5:6,6:5,7:4,8:3,9:2,10:1,11:0,12:0};

let total = {};
let killsTotal = {};

function processar(){

let mapa = {};
let linhas = document.getElementById("teams").value.split("\n");

let timeAtual = "";

linhas.forEach(l=>{
l = l.trim();

if(l.startsWith("LINE")){
timeAtual = l.split(":")[1].trim();
}

if(l.startsWith("JOGADOR")){
let nick = l.split(":")[1].trim().toLowerCase();
mapa[nick] = timeAtual;
}
});

let texto = document.getElementById("input").value.split("\n");

let time = "";
let pos = 0;
let kills = [];
let timeFinal = "";

texto.forEach(l=>{

l = l.trim();
if(l=="") return;

if(!l.includes(":")){
let partes = l.split(" ");
time = partes[0];
pos = parseInt(partes[1]);
kills = [];
timeFinal = time;
}else{
let [nick,k] = l.split(":");
nick = nick.trim().toLowerCase();
k = parseInt(k);

kills.push(k);

// 👇 AQUI CORRIGIDO
if(mapa[nick]){
timeFinal = mapa[nick];
}
}

if(kills.length==4){

let soma = kills.reduce((a,b)=>a+b,0);
let pts = soma + (tabela[pos]||0);

total[timeFinal] = (total[timeFinal]||0)+pts;
killsTotal[timeFinal] = (killsTotal[timeFinal]||0)+soma;

kills=[];
}

});

atualizar();
}

function atualizar(){

let rank = Object.entries(total).sort((a,b)=>b[1]-a[1]);

let html="";

rank.forEach(([t,p],i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${t}</td>
<td>${killsTotal[t]}</td>
<td>${p}</td>
</tr>
`;
});

document.getElementById("ranking").innerHTML = html;
}

function resetar(){
total={};
killsTotal={};
document.getElementById("ranking").innerHTML="";
}

function gerar(){

let file=document.getElementById("img").files[0];
if(!file) return;

let img=new Image();
img.src=URL.createObjectURL(file);

img.onload=function(){

let c=document.getElementById("cv");
let ctx=c.getContext("2d");

c.width=img.width;
c.height=img.height;

ctx.drawImage(img,0,0);

let rank=Object.entries(total).sort((a,b)=>b[1]-a[1]);

ctx.font=(img.width*0.03)+"px Arial";
ctx.fillStyle="white";

let y=img.height*0.4;
let esp=img.height*0.06;

rank.forEach(([t,p],i)=>{

let yy=y+(i*esp);

ctx.fillText(t,img.width*0.3,yy);
ctx.fillText(killsTotal[t],img.width*0.7,yy);
ctx.fillText(p,img.width*0.85,yy);

});

}
}

</script>

</body>
</html>
